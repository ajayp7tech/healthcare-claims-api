name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: claims_db
          POSTGRES_USER: claims_user
          POSTGRES_PASSWORD: claims_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run unit tests
        run: mvn clean verify -Punit-tests

      - name: Run integration tests
        run: mvn verify -Pintegration-tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/claims_db
          SPRING_DATASOURCE_USERNAME: claims_user
          SPRING_DATASOURCE_PASSWORD: claims_pass

      - name: SonarQube analysis
        run: mvn sonar:sonar -Dsonar.projectKey=healthcare-claims-api
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Build Docker image
        run: docker build -t healthcare-claims-api:${{ github.sha }} .

      - name: Push to Amazon ECR
        if: github.ref == 'refs/heads/main'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin $ECR_REGISTRY
          docker tag healthcare-claims-api:${{ github.sha }} \
            $ECR_REGISTRY/healthcare-claims-api:${{ github.sha }}
          docker push $ECR_REGISTRY/healthcare-claims-api:${{ github.sha }}
